name: hello github

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cài đặt Ngrok
        run: choco install ngrok -y

      - name: Cấu hình Ngrok Token
        run: ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Tạo User và bật RDP
        shell: powershell
        run: |
          net user Gemini DepTraiCuTo@0909 /add
          net localgroup Administrators Gemini /add
          net localgroup "Remote Desktop Users" Gemini /add

          reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Chạy Ngrok và lấy link
        shell: powershell
        run: |
          Start-Process ngrok -ArgumentList "tcp 3389 --region=ap"

          # đợi ngrok khởi động
          Start-Sleep -Seconds 10

          $host=""
          for ($i=0; $i -lt 15; $i++) {
            try {
              $tunnel = Invoke-RestMethod http://127.0.0.1:4040/api/tunnels
              $host = $tunnel.tunnels[0].public_url
              if ($host) { break }
            } catch {}
            Start-Sleep -Seconds 2
          }

          $host_clean = $host -replace "tcp://",""
          $parts = $host_clean.Split(":")
          $ip = $parts[0]
          $port = $parts[1]

          Write-Host "--------------------------------------"
          Write-Host "RDP HOST: $host"
          Write-Host "USER: Gemini"
          Write-Host "PASS: DepTraiCuTo@0909"
          Write-Host ""
          Write-Host "SSH COMMAND:"
          Write-Host "ssh Gemini@$ip -p $port"
          Write-Host "--------------------------------------"

      - name: Giữ máy 6 tiếng
        run: ping -t localhost
