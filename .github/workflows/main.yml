name: hello github 

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cài đặt Ngrok
        run: choco install ngrok -y

      - name: Cấu hình Ngrok Token
        run: ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Tạo User và bật RDP
        run: |
          net user Gemini DepTraiCuTo@0909 /add
          net localgroup Administrators Gemini /add
          net localgroup "Remote Desktop Users" Gemini /add
          reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Chạy Ngrok
        shell: powershell
        run: |
          Start-Process ngrok -ArgumentList "tcp 3389 --region=ap --log=stdout" -RedirectStandardOutput ngrok.log
          Start-Sleep -Seconds 20
          
          $link = Get-Content ngrok.log | Select-String -Pattern "tcp://.*\.tcp\.ngrok\.io:\d+" | Select-Object -First 1
          
          Write-Host "--------------------------------------"
          Write-Host "RDP HOST: $($link.Matches.Value)"
          Write-Host "USER: Gemini"
          Write-Host "PASS: DepTraiCuTo@0909"
          Write-Host "--------------------------------------"

      - name: Giữ máy 6 tiếng
        run: Start-Sleep -Seconds 21600
