name: hello github

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cài đặt Ngrok
        run: choco install ngrok -y

      - name: Cấu hình Ngrok Token
        run: ngrok config add-authtoken ${{ secrets.NGROK_AUTH_TOKEN }}

      - name: Tạo User và bật RDP
        shell: powershell
        run: |
          $password = ConvertTo-SecureString "DepTraiCuTo@0909Aa!" -AsPlainText -Force
          New-LocalUser "cuong" -Password $password -FullName "cuong"

          Add-LocalGroupMember -Group "Administrators" -Member "cuong"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "cuong"

          reg add "HKLM\System\CurrentControlSet\Control\Terminal Server" /v fDenyTSConnections /t REG_DWORD /d 0 /f
          Enable-NetFirewallRule -DisplayGroup "Remote Desktop"

      - name: Chạy Ngrok và lấy link
        shell: powershell
        run: |
          Start-Process ngrok -ArgumentList "tcp 3389 --region=ap" -WindowStyle Hidden
          Start-Sleep -Seconds 10

          $rdpHost=""

          for ($i=0; $i -lt 15; $i++) {
            try {
              $tunnel = Invoke-RestMethod http://127.0.0.1:4040/api/tunnels
              $rdpHost = $tunnel.tunnels[0].public_url
              if ($rdpHost) { break }
            } catch {}
            Start-Sleep -Seconds 2
          }

          Write-Host "--------------------------------------"
          Write-Host "RDP HOST: $rdpHost"
          Write-Host "USER: cuong"
          Write-Host "PASS: DepTraiCuTo@0909Aa!"
          Write-Host "--------------------------------------"

      - name: Giữ máy 6 tiếng
        shell: powershell
        run: Start-Sleep -Seconds 21600
